<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guess the Celebrity</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-board" aria-label="Guess the Celebrity game">
        <header class="topbar">
          <div>
            <p class="eyebrow">Three hints. One famous face.</p>
            <h1>Guess the Celebrity</h1>
          </div>
          <div class="top-actions" aria-label="Game controls">
            <button class="icon-button" id="soundToggle" type="button" aria-label="Toggle sound">
              <span aria-hidden="true">Sound</span>
            </button>
            <button class="icon-button" id="newGameButton" type="button" aria-label="Start a new game">
              <span aria-hidden="true">New</span>
            </button>
          </div>
        </header>

        <div class="stage-row">
          <div class="stage-art" aria-hidden="true">
            <svg viewBox="0 0 320 260" role="img">
              <defs>
                <linearGradient id="stageGlow" x1="0" x2="1" y1="0" y2="1">
                  <stop offset="0" stop-color="#ffe66d" />
                  <stop offset="0.45" stop-color="#ff4f9f" />
                  <stop offset="1" stop-color="#2de2e6" />
                </linearGradient>
                <linearGradient id="floorGlow" x1="0" x2="1" y1="0" y2="0">
                  <stop offset="0" stop-color="#2de2e6" />
                  <stop offset="0.5" stop-color="#fff6a3" />
                  <stop offset="1" stop-color="#ff4f9f" />
                </linearGradient>
              </defs>
              <path class="beam beam-left" d="M42 24 L139 220 L91 228 L20 44 Z" />
              <path class="beam beam-right" d="M278 24 L181 220 L229 228 L300 44 Z" />
              <path class="beam beam-mid" d="M160 16 L204 224 L116 224 Z" />
              <ellipse cx="160" cy="224" rx="124" ry="22" fill="url(#floorGlow)" opacity=".9" />
              <rect x="54" y="201" width="212" height="22" rx="7" fill="#17171f" />
              <circle cx="160" cy="118" r="50" fill="#181824" stroke="url(#stageGlow)" stroke-width="8" />
              <path d="M134 123c6 18 18 28 26 28s20-10 26-28c8-4 12-13 10-22-2-13-14-23-36-23s-34 10-36 23c-2 9 2 18 10 22z" fill="#f9d4c1" />
              <path d="M121 101c9-33 69-33 78 0-16-14-35-15-45-10-9 4-19 7-33 10z" fill="#27242d" />
              <rect x="144" y="154" width="32" height="48" rx="13" fill="#f27a54" />
              <path d="M105 203c12-28 30-42 55-42s43 14 55 42z" fill="#2de2e6" />
              <path d="M142 183h36l-18 20z" fill="#fff6a3" />
              <rect x="244" y="84" width="16" height="78" rx="8" fill="#f9f7ef" />
              <circle cx="252" cy="74" r="19" fill="#f9f7ef" />
              <path d="M241 73h22M241 80h22M245 67h14" stroke="#181824" stroke-width="4" stroke-linecap="round" />
            </svg>
          </div>

          <div class="round-card">
            <div class="round-meta">
              <span id="categoryPill">Spotlight</span>
              <span id="roundCounter">Round 1</span>
            </div>
            <div class="timer-wrap" aria-label="Round timer">
              <div class="timer-track">
                <div class="timer-fill" id="timerFill"></div>
              </div>
              <span id="timerText">30s</span>
            </div>
            <div class="hint-list" id="hintList" aria-live="polite"></div>
          </div>
        </div>

        <section class="answer-zone" aria-label="Answer controls">
          <form class="guess-form" id="guessForm">
            <label class="sr-only" for="guessInput">Your guess</label>
            <input id="guessInput" autocomplete="off" spellcheck="false" placeholder="Type the celebrity name" />
            <button id="submitButton" type="submit">Guess</button>
          </form>

          <div class="choice-grid" id="choiceGrid" aria-label="Quick answers"></div>

          <div class="feedback-row">
            <p id="feedbackText" aria-live="polite">Pick a name or type your guess.</p>
            <button id="skipButton" type="button">Skip</button>
          </div>
        </section>
      </section>

      <aside class="side-panel" aria-label="Score and modes">
        <div class="stat-grid">
          <div class="stat">
            <span>Score</span>
            <strong id="scoreText">0</strong>
          </div>
          <div class="stat">
            <span>Streak</span>
            <strong id="streakText">0</strong>
          </div>
          <div class="stat">
            <span>Lives</span>
            <strong id="livesText">3</strong>
          </div>
          <div class="stat">
            <span>Best</span>
            <strong id="bestText">0</strong>
          </div>
        </div>

        <div class="mode-panel">
          <h2>Modes</h2>
          <div class="segmented" role="group" aria-label="Game mode">
            <button class="mode-button active" id="chillMode" type="button">Chill</button>
            <button class="mode-button" id="blitzMode" type="button">Blitz</button>
          </div>
          <button class="wide-button" id="dailyButton" type="button">Daily Mix</button>
          <button class="wide-button ghost" id="shuffleButton" type="button">Shuffle Round</button>
        </div>

        <div class="progress-panel">
          <h2>Studio Stats</h2>
          <div class="meter-label">
            <span>Accuracy</span>
            <strong id="accuracyText">0%</strong>
          </div>
          <div class="meter">
            <div id="accuracyFill"></div>
          </div>
          <div class="mini-stats">
            <span id="poolText">100k+ clue mixes</span>
            <span id="skipText">3 skips left</span>
          </div>
        </div>
      </aside>
    </main>

    <canvas id="confettiCanvas" aria-hidden="true"></canvas>
    <script src="game.js"></script>
  </body>
</html>
